<!DOCTYPE html>
<html>

<head>
<title>Ollama Web Chat</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
padding:40px;
}

h1{
color:#ff7ad9;
}

#chat{
border:1px solid #333;
height:400px;
overflow-y:auto;
padding:15px;
margin-bottom:20px;
background:#111;
}

textarea{
width:100%;
height:70px;
font-size:16px;
}

button{
padding:10px 20px;
margin-top:10px;
font-size:16px;
cursor:pointer;
}

.user{
color:#4fc3f7;
margin-bottom:10px;
}

.bot{
color:#9cff9c;
margin-bottom:15px;
}

</style>

</head>

<body>

<h1>🧠 Ollama Web Chat</h1>

<div id="chat"></div>

<select id="model">

<option value="phi3:mini">Phi-3 Mini</option>
<option value="gemma:2b">Gemma 2B</option>
<option value="qwen2.5:3b">Qwen 3B</option>
<option value="mistral:latest">Mistral</option>
<option value="llama3:8b">Llama3</option>
<option value="deepseek-r1:8b">DeepSeek</option>

</select>

<br><br>

<textarea id="prompt" placeholder="Type your message..."></textarea>

<br>

<button onclick="send()">Send</button>

<script>
async function send(){

const input = document.getElementById("prompt")
const prompt = input.value.trim()
const model = document.getElementById("model").value
const chat = document.getElementById("chat")

if(prompt === "") return
chat.innerHTML += `<div class="user">You: ${prompt}</div>`

const botDiv = document.createElement("div")
botDiv.className = "bot"
botDiv.innerHTML = "Bot: "
chat.appendChild(botDiv)

chat.scrollTop = chat.scrollHeight

input.value = ""

const response = await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
prompt:prompt,
model:model
})
})

const reader = response.body.getReader()
const decoder = new TextDecoder()

while(true){

const {done,value} = await reader.read()

if(done) break

botDiv.innerHTML += decoder.decode(value)
chat.scrollTop = chat.scrollHeight

}

}
</script>

</body>

</html>
